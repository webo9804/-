<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:black;">
<canvas id="gameCanvas"></canvas>
<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let player = { x: canvas.width/2, y: canvas.height - 80 };
    let bullets = [];
    let enemies = [];
    let score = 0;
    
    // 設定變數：敵人寬度與子彈速度
    const ENEMY_SIZE = 60; 
    const BULLET_SPEED = 15;

    // 自動生成敵人的邏輯
    function spawnEnemy() {
        if (enemies.length < 5) {
            enemies.push({ 
                x: Math.random() * (canvas.width - ENEMY_SIZE), 
                y: -50, 
                vx: Math.random() * 4 - 2, 
                vy: 2 + (score / 5), // 難度爬升係數
                alive: true 
            });
        }
    }

    // 射擊邏輯
    window.addEventListener("mousedown", (e) => {
        let dx = e.clientX - player.x;
        let dy = e.clientY - player.y;
        let mag = Math.sqrt(dx*dx + dy*dy);
        bullets.push({ x: player.x, y: player.y, vx: (dx/mag)*BULLET_SPEED, vy: (dy/mag)*BULLET_SPEED });
    });

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 敵人更新與自動生成
        spawnEnemy();
        enemies.forEach((e, ei) => {
            if(!e.alive) {
                enemies.splice(ei, 1);
                return;
            }
            e.x += e.vx; e.y += e.vy;
            
            // 邊緣反彈
            if(e.x < 0 || e.x > canvas.width - ENEMY_SIZE) e.vx *= -1;
            
            ctx.fillStyle = "red";
            ctx.fillRect(e.x, e.y, ENEMY_SIZE, ENEMY_SIZE);
            
            // 超出螢幕重置
            if(e.y > canvas.height) {
                e.y = -50;
                e.x = Math.random() * (canvas.width - ENEMY_SIZE);
            }
        });

        // 子彈與碰撞
        bullets.forEach((b, bi) => {
            b.x += b.vx; b.y += b.vy;
            ctx.fillStyle = "yellow";
            ctx.fillRect(b.x, b.y, 8, 8);
            
            enemies.forEach(e => {
                // AABB 碰撞檢測 (使用 ENEMY_SIZE)
                if (e.alive && b.x > e.x && b.x < e.x + ENEMY_SIZE && b.y > e.y && b.y < e.y + ENEMY_SIZE) {
                    e.alive = false;
                    score += 10;
                    bullets.splice(bi, 1);
                }
            });
        });

        // 繪製分數
        ctx.fillStyle = "white";
        ctx.font = "24px Arial";
        ctx.fillText("Score: " + score, 20, 40);
        
        requestAnimationFrame(update);
    }
    update();
</script>
</body>
</html>
