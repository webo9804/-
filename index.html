<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; display: flex; height: 100vh; font-family: Arial; }
        #gameCanvas { background: #000; flex: 3; cursor: crosshair; }
        #uiPanel { flex: 1; padding: 20px; background: #222; border-left: 2px solid #444; }
        .stat { margin-bottom: 15px; font-size: 20px; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="uiPanel">
    <h1>射擊挑戰</h1>
    <div class="stat">分數: <span id="sVal">0</span></div>
    <div class="stat">時間: <span id="tVal">60</span>s</div>
    <div class="stat">難度: <span id="dVal">1</span></div>
    <p style="color: #888;">點擊射擊方塊，越玩越快喔！</p>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const sVal = document.getElementById("sVal");
    const tVal = document.getElementById("tVal");
    const dVal = document.getElementById("dVal");

    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;

    let bullets = [], enemies = [], score = 0, timeLeft = 60, gameActive = true;
    const colors = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33A8'];

    // 隨機生成方塊
    function spawnEnemy() {
        if (gameActive && Math.random() < 0.02) { // 這裡控制量，0.02 比較少
            enemies.push({ 
                x: Math.random() * (canvas.width - 50), y: -50, 
                vx: Math.random() * 2 - 1, vy: 1 + (score/50), 
                color: colors[Math.floor(Math.random()*colors.length)],
                alive: true 
            });
        }
    }

    window.addEventListener("mousedown", (e) => {
        if(!gameActive) return;
        bullets.push({ x: e.clientX, y: e.clientY, vx: 0, vy: 0 }); // 簡單射擊
    });

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(!gameActive) return;

        spawnEnemy();
        enemies.forEach((e, i) => {
            e.y += e.vy;
            ctx.fillStyle = e.color;
            ctx.fillRect(e.x, e.y, 50, 50);
            
            // 碰撞判定
            bullets.forEach(b => {
                if(b.x > e.x && b.x < e.x+50 && b.y > e.y && b.y < e.y+50) {
                    e.alive = false; score += 10; sVal.innerText = score;
                }
            });
            if(e.y > canvas.height) e.alive = false;
        });
        enemies = enemies.filter(e => e.alive);
        bullets = []; // 射擊後清空
        
        requestAnimationFrame(update);
    }

    setInterval(() => {
        if(timeLeft > 0) { timeLeft--; tVal.innerText = timeLeft; }
        else gameActive = false;
    }, 1000);

    update();
</script>
</body>
</html>
