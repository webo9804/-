<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>射擊挑戰</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+TC:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #ff3c3c;
      --accent2: #ffce00;
      --bg: #0a0a0f;
      --panel: #111118;
      --border: #2a2a3a;
      --text: #e8e8f0;
      --muted: #666680;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    /* ── Canvas area ── */
    #canvasWrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      touch-action: none;
    }

    /* ── Side panel ── */
    #uiPanel {
      width: 200px;
      min-width: 160px;
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 16px 20px;
      gap: 0;
    }

    .panel-title {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 28px;
      text-align: center;
    }

    .stat-block {
      margin-bottom: 20px;
    }

    .stat-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .stat-value {
      font-family: 'Orbitron', monospace;
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .stat-value.accent { color: var(--accent2); }

    /* combo flash */
    @keyframes comboPop {
      0%   { transform: scale(1.4); color: #ff3c3c; }
      100% { transform: scale(1);   color: var(--text); }
    }
    .combo-pop { animation: comboPop 0.3s ease-out forwards; }

    /* time bar */
    #timeBarWrap {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }
    #timeBar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 1s linear, background 0.5s;
    }

    /* speed indicator */
    #speedPips {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .pip {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.3s;
    }
    .pip.on { background: var(--accent2); }

    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    /* pause btn */
    #pauseBtn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 8px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      width: 100%;
      margin-bottom: 10px;
      display: none;
    }
    #pauseBtn:hover { border-color: var(--accent); color: var(--text); }

    .dev-info {
      margin-top: auto;
      font-size: 10px;
      color: var(--muted);
      line-height: 1.6;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    /* ── Overlay screens ── */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,15,0.88);
      backdrop-filter: blur(6px);
      z-index: 10;
      gap: 20px;
      transition: opacity 0.3s;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }

    .overlay-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(18px, 4vw, 36px);
      font-weight: 900;
      letter-spacing: 4px;
      color: var(--accent);
      text-shadow: 0 0 30px rgba(255,60,60,0.5);
      text-align: center;
    }

    .overlay-sub {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    .final-score {
      font-family: 'Orbitron', monospace;
      font-size: clamp(40px, 8vw, 72px);
      font-weight: 900;
      color: var(--accent2);
    }

    .btn {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      letter-spacing: 3px;
      padding: 14px 36px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 20px rgba(255,60,60,0.3);
    }
    .btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255,60,60,0.5); }
    .btn:active { transform: scale(0.97); }

    /* ── Pause overlay ── */
    #pauseOverlay { background: rgba(10,10,15,0.75); backdrop-filter: blur(4px); }

    /* ── Combo popup on canvas ── */
    #comboPopup {
      position: absolute;
      pointer-events: none;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 18px;
      color: var(--accent2);
      text-shadow: 0 0 10px rgba(255,206,0,0.8);
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 5;
    }
    @keyframes popFloat {
      0%   { opacity: 1; transform: translateY(0) scale(1.2); }
      80%  { opacity: 0.8; }
      100% { opacity: 0; transform: translateY(-40px) scale(0.9); }
    }
    #comboPopup.show { animation: popFloat 0.7s ease-out forwards; }
  </style>
</head>
<body>

<div id="canvasWrap">
  <canvas id="gameCanvas"></canvas>

  <!-- Start overlay -->
  <div class="overlay" id="startOverlay">
    <div class="overlay-title">射擊挑戰</div>
    <div class="overlay-sub">點擊敵人方塊消滅它們<br>連擊可獲得加倍分數</div>
    <button class="btn" id="startBtn">開始遊戲</button>
  </div>

  <!-- Pause overlay -->
  <div class="overlay hidden" id="pauseOverlay">
    <div class="overlay-title">暫停</div>
    <button class="btn" id="resumeBtn">繼續</button>
  </div>

  <!-- End overlay -->
  <div class="overlay hidden" id="endOverlay">
    <div class="overlay-title">遊戲結束</div>
    <div class="final-score" id="finalScore">0</div>
    <div class="overlay-sub" id="endMsg"></div>
    <button class="btn" id="restartBtn">再玩一次</button>
  </div>

  <!-- Floating combo text -->
  <div id="comboPopup"></div>
</div>

<div id="uiPanel">
  <div class="panel-title">射擊挑戰</div>

  <div class="stat-block">
    <div class="stat-label">分數</div>
    <div class="stat-value" id="sVal">0</div>
  </div>

  <div class="stat-block">
    <div class="stat-label">連擊</div>
    <div class="stat-value accent" id="comboVal">×1</div>
  </div>

  <div class="stat-block">
    <div class="stat-label">剩餘時間</div>
    <div class="stat-value" id="tVal">60</div>
    <div id="timeBarWrap"><div id="timeBar" style="width:100%"></div></div>
  </div>

  <div class="stat-block">
    <div class="stat-label">速度等級</div>
    <div class="stat-value" id="vVal">1</div>
    <div id="speedPips"></div>
  </div>

  <hr class="divider">
  <button id="pauseBtn">⏸ 暫停</button>

  <div class="dev-info">
    開發者<br>沈葦柏 / 何品睿
  </div>
</div>

<script>
// ── Constants ──
const TOTAL_TIME    = 60;
const ENEMY_SIZE    = 50;
const SPAWN_RATE    = 0.022;      // per-frame chance
const BASE_SPEED    = 1.2;
const SPEED_INC     = 0.1;        // per second
const BULLET_FADE   = 0.12;
const COMBO_TIMEOUT = 1800;       // ms to reset combo
const MAX_SPEED_PIPS = 10;

// ── State ──
let enemies = [], bullets = [], particles = [];
let score = 0, timeLeft = TOTAL_TIME, fallSpeed = BASE_SPEED;
let gameActive = false, paused = false;
let combo = 1, comboTimer = null;
let rafId = null, timerInterval = null;
let missCount = 0;

// ── DOM refs ──
const canvas        = document.getElementById('gameCanvas');
const ctx           = canvas.getContext('2d');
const sVal          = document.getElementById('sVal');
const tVal          = document.getElementById('tVal');
const vVal          = document.getElementById('vVal');
const comboVal      = document.getElementById('comboVal');
const timeBar       = document.getElementById('timeBar');
const speedPips     = document.getElementById('speedPips');
const startOverlay  = document.getElementById('startOverlay');
const pauseOverlay  = document.getElementById('pauseOverlay');
const endOverlay    = document.getElementById('endOverlay');
const finalScore    = document.getElementById('finalScore');
const endMsg        = document.getElementById('endMsg');
const pauseBtn      = document.getElementById('pauseBtn');
const comboPopup    = document.getElementById('comboPopup');

const playerImg = new Image();
playerImg.src = 'https://raw.githubusercontent.com/webo9804/point-to-anime/main/ET6yUFLXgAEsCwx-Photoroom.png';

// ── Canvas resize ──
function resizeCanvas() {
  const wrap = document.getElementById('canvasWrap');
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── Speed pip UI ──
function buildPips() {
  speedPips.innerHTML = '';
  for (let i = 0; i < MAX_SPEED_PIPS; i++) {
    const d = document.createElement('div');
    d.className = 'pip';
    speedPips.appendChild(d);
  }
}
buildPips();

function updatePips(level) {
  const pips = speedPips.querySelectorAll('.pip');
  pips.forEach((p, i) => p.classList.toggle('on', i < level));
}

// ── Enemy factory ──
function spawnEnemy() {
  const size = ENEMY_SIZE * (0.8 + Math.random() * 0.6);
  const speed = fallSpeed * (0.8 + Math.random() * 0.5);
  const hue = Math.random() * 360;
  return {
    x: Math.random() * (canvas.width - size),
    y: -size,
    size,
    speed,
    hue,
    alive: true,
    rotation: (Math.random() - 0.5) * 0.04,
    angle: 0,
    hp: size > 65 ? 2 : 1,
  };
}

// ── Particle burst ──
function spawnParticles(x, y, hue) {
  for (let i = 0; i < 10; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      alpha: 1,
      hue,
      size: 2 + Math.random() * 3,
    });
  }
}

// ── Combo popup ──
function showComboPopup(x, y, text) {
  const canvasRect = canvas.getBoundingClientRect();
  const wrap = document.getElementById('canvasWrap');
  const wrapRect = wrap.getBoundingClientRect();
  comboPopup.textContent = text;
  comboPopup.style.left = (x - wrapRect.left + canvasRect.left - wrapRect.left) + 'px';
  comboPopup.style.top  = (y - wrapRect.top  + canvasRect.top  - wrapRect.top - 20) + 'px';
  comboPopup.classList.remove('show');
  void comboPopup.offsetWidth;
  comboPopup.classList.add('show');
}

// ── Input ──
canvas.addEventListener('pointerdown', e => {
  if (!gameActive || paused) return;
  e.preventDefault();

  const rect = canvas.getBoundingClientRect();
  const cx   = e.clientX - rect.left;
  const cy   = e.clientY - rect.top;

  // Draw bullet
  const ox = canvas.width / 2;
  const oy = canvas.height - 130;
  bullets.push({ x1: ox, y1: oy, x2: cx, y2: cy, alpha: 1 });

  // Hit detection
  let hit = false;
  enemies.forEach(en => {
    if (!en.alive) return;
    if (cx > en.x && cx < en.x + en.size && cy > en.y && cy < en.y + en.size) {
      en.hp--;
      if (en.hp <= 0) {
        en.alive = false;
        spawnParticles(en.x + en.size / 2, en.y + en.size / 2, en.hue);

        // Combo
        clearTimeout(comboTimer);
        const pts = 10 * combo * Math.round(en.size / ENEMY_SIZE);
        score += pts;
        sVal.textContent = score;

        if (combo > 1) {
          showComboPopup(cx, cy, `×${combo} +${pts}`);
        }
        combo = Math.min(combo + 1, 8);
        comboVal.textContent = `×${combo}`;
        comboVal.classList.remove('combo-pop');
        void comboVal.offsetWidth;
        comboVal.classList.add('combo-pop');

        comboTimer = setTimeout(() => {
          combo = 1;
          comboVal.textContent = '×1';
        }, COMBO_TIMEOUT);

        hit = true;
      }
    }
  });
});

// ── Main loop ──
function update() {
  if (!gameActive || paused) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw player
  if (playerImg.complete && playerImg.naturalWidth > 0) {
    const ratio = playerImg.naturalWidth / playerImg.naturalHeight;
    const h = 220, w = h * ratio;
    ctx.drawImage(playerImg, canvas.width / 2 - w / 2, canvas.height - h + 20, w, h);
  }

  // Bullets
  bullets = bullets.filter(b => {
    ctx.save();
    ctx.strokeStyle = `rgba(255, 230, 0, ${b.alpha})`;
    ctx.lineWidth = 2;
    ctx.shadowBlur = 8;
    ctx.shadowColor = 'rgba(255,230,0,0.6)';
    ctx.beginPath();
    ctx.moveTo(b.x1, b.y1);
    ctx.lineTo(b.x2, b.y2);
    ctx.stroke();
    ctx.restore();
    b.alpha -= BULLET_FADE;
    return b.alpha > 0;
  });

  // Spawn
  if (Math.random() < SPAWN_RATE + (fallSpeed - BASE_SPEED) * 0.005) {
    enemies.push(spawnEnemy());
  }

  // Enemies
  enemies.forEach(en => {
    if (!en.alive) return;
    en.y += en.speed;
    en.angle += en.rotation;
    if (en.y > canvas.height) { en.alive = false; missCount++; }

    ctx.save();
    ctx.translate(en.x + en.size / 2, en.y + en.size / 2);
    ctx.rotate(en.angle);

    // Pulsing glow for high-hp
    const glow = en.hp > 1 ? 16 : 8;
    ctx.shadowBlur = glow;
    ctx.shadowColor = `hsl(${en.hue}, 80%, 60%)`;
    ctx.fillStyle = `hsl(${en.hue}, 70%, ${en.hp > 1 ? 55 : 50}%)`;

    // Shape variety
    if (en.hp > 1) {
      // Diamond shape for tougher enemies
      ctx.beginPath();
      ctx.moveTo(0, -en.size / 2);
      ctx.lineTo(en.size / 2, 0);
      ctx.lineTo(0, en.size / 2);
      ctx.lineTo(-en.size / 2, 0);
      ctx.closePath();
      ctx.fill();
    } else {
      ctx.fillRect(-en.size / 2, -en.size / 2, en.size, en.size);
    }

    ctx.restore();
  });
  enemies = enemies.filter(en => en.alive);

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.12;
    p.alpha -= 0.035;
    if (p.alpha <= 0) return false;
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = `hsl(${p.hue}, 80%, 65%)`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    return true;
  });

  rafId = requestAnimationFrame(update);
}

// ── Timer ──
function startTimer() {
  timerInterval = setInterval(() => {
    if (!gameActive || paused) return;
    timeLeft--;
    tVal.textContent = timeLeft;

    // Time bar
    const pct = (timeLeft / TOTAL_TIME) * 100;
    timeBar.style.width = pct + '%';
    if (pct < 30) timeBar.style.background = '#ff3c3c';
    else if (pct < 60) timeBar.style.background = '#ffce00';
    else timeBar.style.background = 'var(--accent)';

    // Speed
    fallSpeed = BASE_SPEED + (TOTAL_TIME - timeLeft) * SPEED_INC;
    const level = Math.min(Math.floor(TOTAL_TIME - timeLeft) + 1, MAX_SPEED_PIPS);
    vVal.textContent = fallSpeed.toFixed(1);
    updatePips(level);

    if (timeLeft <= 0) endGame();
  }, 1000);
}

// ── Game flow ──
function startGame() {
  score = 0; timeLeft = TOTAL_TIME; fallSpeed = BASE_SPEED;
  combo = 1; missCount = 0;
  enemies = []; bullets = []; particles = [];
  sVal.textContent = '0';
  tVal.textContent = TOTAL_TIME;
  comboVal.textContent = '×1';
  vVal.textContent = BASE_SPEED.toFixed(1);
  timeBar.style.width = '100%';
  timeBar.style.background = 'var(--accent)';
  updatePips(1);

  startOverlay.classList.add('hidden');
  endOverlay.classList.add('hidden');
  pauseBtn.style.display = 'block';

  gameActive = true;
  paused = false;
  startTimer();
  rafId = requestAnimationFrame(update);
}

function endGame() {
  gameActive = false;
  clearInterval(timerInterval);
  cancelAnimationFrame(rafId);
  pauseBtn.style.display = 'none';

  finalScore.textContent = score;
  const grade = score >= 500 ? '🏆 神射手！' : score >= 300 ? '🎯 優秀！' : score >= 150 ? '👍 不錯！' : '繼續加油！';
  endMsg.textContent = grade + `  連擊最高 ×${combo}  漏掉 ${missCount} 個`;
  endOverlay.classList.remove('hidden');
}

function togglePause() {
  if (!gameActive) return;
  paused = !paused;
  pauseOverlay.classList.toggle('hidden', !paused);
  pauseBtn.textContent = paused ? '▶ 繼續' : '⏸ 暫停';
  if (!paused) rafId = requestAnimationFrame(update);
}

// ── Button events ──
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);
pauseBtn.addEventListener('click', togglePause);
document.getElementById('resumeBtn').addEventListener('click', togglePause);

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' || e.key === 'p') togglePause();
});
</script>
</body>
</html>
