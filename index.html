<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>射擊挑戰</title>
    <style>
        body { margin: 0; background: #000; color: white; display: flex; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #gameCanvas { flex: 3; touch-action: none; background: #111; cursor: crosshair; }
        #uiPanel { flex: 1; min-width: 200px; padding: 20px; background: #222; border-left: 2px solid #444; display: flex; flex-direction: column; }
        .stat { margin-bottom: 10px; font-size: 18px; color: #fff; }
        .dev-info { margin-top: auto; font-size: 14px; color: #888; border-top: 1px solid #444; padding-top: 10px; }
        #startBtn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 24px; background: #ff3333; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="uiPanel">
    <h1>射擊挑戰</h1>
    <div class="stat">分數: <span id="sVal">0</span></div>
    <div class="stat">時間: <span id="tVal">60</span>s</div>
    <div class="stat">下落速度: <span id="vVal">1.0</span></div>
    <div class="dev-info">開發者：沈葦柏 / 何品睿</div>
</div>
<button id="startBtn">開始遊戲</button>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const sVal = document.getElementById("sVal"), tVal = document.getElementById("tVal"), vVal = document.getElementById("vVal");
    
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;

    const playerImg = new Image();
    playerImg.src = 'https://raw.githubusercontent.com/webo9804/point-to-anime/main/ET6yUFLXgAEsCwx-Photoroom.png';

    let enemies = [], bullets = [], score = 0, timeLeft = 60, gameActive = false, fallSpeed = 1;

    window.addEventListener("pointerdown", (e) => {
        if(!gameActive || e.target !== canvas) return;
        const originX = canvas.width / 2;
        const originY = canvas.height - 150;
        bullets.push({ x1: originX, y1: originY, x2: e.clientX, y2: e.clientY, alpha: 1 });
        
        enemies.forEach(en => {
            if(e.clientX > en.x && e.clientX < en.x+50 && e.clientY > en.y && e.clientY < en.y+50) {
                en.alive = false; score += 10; sVal.innerText = score;
            }
        });
    });

    function update() {
        if(!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const ratio = playerImg.naturalWidth / playerImg.naturalHeight || 1;
        const h = 300, w = h * ratio;
        ctx.drawImage(playerImg, canvas.width/2 - w/2, canvas.height - h + 30, w, h);

        bullets.forEach((b, i) => {
            ctx.strokeStyle = `rgba(255, 255, 0, ${b.alpha})`;
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(b.x1, b.y1); ctx.lineTo(b.x2, b.y2); ctx.stroke();
            b.alpha -= 0.1;
            if(b.alpha <= 0) bullets.splice(i, 1);
        });

        if (Math.random() < 0.02) {
            enemies.push({ x: Math.random() * (canvas.width - 50), y: -50, color: `hsl(${Math.random()*360}, 70%, 60%)`, alive: true });
        }

        enemies.forEach(e => {
            e.y += fallSpeed;
            ctx.fillStyle = e.color;
            ctx.fillRect(e.x, e.y, 50, 50);
            if(e.y > canvas.height) e.alive = false;
        });
        enemies = enemies.filter(e => e.alive);
        
        requestAnimationFrame(update);
    }

    document.getElementById("startBtn").addEventListener("click", (e) => {
        e.target.style.display = "none";
        gameActive = true;
        const timer = setInterval(() => {
            if(timeLeft > 0) { timeLeft--; tVal.innerText = timeLeft; fallSpeed += 0.1; vVal.innerText = fallSpeed.toFixed(1); }
            else { clearInterval(timer); gameActive = false; alert("遊戲結束，得分: " + score); location.reload(); }
        }, 1000);
        update();
    });
</script>
</body>
</html>
