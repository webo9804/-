<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>射擊挑戰</title>
    <style>
        body { margin: 0; background: #000; color: white; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #gameCanvas { display: block; touch-action: none; width: 100vw; height: 100vh; }
        #uiPanel { position: absolute; top: 10px; left: 10px; pointer-events: none; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; }
        #startBtn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 24px; background: #ff3333; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="uiPanel">
    <div>分數: <span id="sVal">0</span> | 時間: <span id="tVal">60</span>s</div>
    <div style="font-size: 12px; color: #aaa;">開發者：沈葦柏 / 何品睿</div>
</div>
<button id="startBtn">開始遊戲</button>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const startBtn = document.getElementById("startBtn");
    const sVal = document.getElementById("sVal");
    const tVal = document.getElementById("tVal");
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // 載入角色圖片
    const playerImg = new Image();
    playerImg.src = 'https://raw.githubusercontent.com/webo9804/point-to-anime/main/ET6yUFLXgAEsCwx-Photoroom.png';

    let enemies = [], score = 0, timeLeft = 60, gameActive = false;

    startBtn.addEventListener("click", () => {
        gameActive = true;
        startBtn.style.display = "none";
        const timer = setInterval(() => {
            if(timeLeft > 0) { timeLeft--; tVal.innerText = timeLeft; }
            else { clearInterval(timer); gameActive = false; }
        }, 1000);
        requestAnimationFrame(update);
    });

    window.addEventListener("pointerdown", (e) => {
        if(!gameActive) return;
        enemies.forEach(en => {
            if(e.clientX > en.x && e.clientX < en.x+50 && e.clientY > en.y && e.clientY < en.y+50) {
                en.alive = false; 
                score += 10; 
                sVal.innerText = score;
            }
        });
    });

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 繪製角色 (依比例計算大小，避免變形)
        if (playerImg.complete) {
            const aspectRatio = playerImg.naturalWidth / playerImg.naturalHeight;
            const pHeight = 300; 
            const pWidth = pHeight * aspectRatio;
            ctx.drawImage(playerImg, canvas.width/2 - pWidth/2, canvas.height - pHeight + 30, pWidth, pHeight);
        }

        if(gameActive) {
            // 生成敵人
            if (Math.random() < 0.03) {
                enemies.push({ x: Math.random() * (canvas.width - 50), y: -50, vy: 2 + (score/100), alive: true });
            }

            // 更新敵人
            enemies.forEach((e) => {
                e.y += e.vy;
                ctx.fillStyle = "#FF5733";
                ctx.fillRect(e.x, e.y, 50, 50);
                if(e.y > canvas.height) e.alive = false;
            });
            enemies = enemies.filter(e => e.alive);
            requestAnimationFrame(update);
        } else if (score > 0 || timeLeft === 0) {
            // 遊戲結束結算畫面
            ctx.fillStyle = "white";
            ctx.font = "30px Arial";
            ctx.textAlign = "center";
            ctx.fillText("遊戲結束! 最終分數: " + score, canvas.width/2, canvas.height/2);
        }
    }
</script>
</body>
</html>
